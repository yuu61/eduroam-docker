# テスト用RADIUSクライアント
client localhost {
    ipaddr = 127.0.0.1
    secret = $ENV{RADIUS_SECRET}
    require_message_authenticator = no
    nas_type = other
}

# Docker内部ネットワークからのアクセスを許可
client docker-network {
    ipaddr = 172.16.0.0/12
    secret = $ENV{RADIUS_SECRET}
    require_message_authenticator = no
    nas_type = other
    shortname = docker
}

