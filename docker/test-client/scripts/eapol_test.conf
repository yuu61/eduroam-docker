# EAP-TTLS/PAP テスト設定
# eapol_test -c /scripts/eapol_test.conf -s $RADIUS_SECRET -a freeradius
# 注意: eapol_testは環境変数をサポートしないため、テスト用の値を直接記述している。
# docker/.env の TEST_USER / TEST_PASSWORD と一致させること。
network={
    ssid="eduroam"
    key_mgmt=WPA-EAP
    eap=TTLS
    anonymous_identity="anonymous@kobedenshi.ac.jp"
    identity="testuser1@kobedenshi.ac.jp"
    password="changeme-test-pass"
    phase2="auth=PAP"
    # 検証環境では証明書検証を無効化
    # 本番ではca_cert指定が必須
    # ca_cert="/scripts/ca.crt"
}
